<svg width="1600" height="900" viewBox="0 0 1600 900" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Flat sophisticated charcoal background -->
  <rect width="1600" height="900" fill="#2B2B2B"/>
  
  <!-- Subtle accent shapes -->
  <rect x="0" y="0" width="1600" height="40" fill="#E52326"/> <!-- Lightspeed Flame Red Top Bar -->
  <rect x="1100" y="-100" width="800" height="1100" rx="400" fill="#363636" transform="rotate(-15)"/>
  
  <!-- Icon Copy: Left Side Content -->
  <rect x="120" y="160" width="560" height="80" rx="16" fill="#3D3D3D"/>
  <text x="160" y="210" fill="#FFFFFF" font-family="'Avenir Next', 'Segoe UI', sans-serif" font-size="28" font-weight="700" letter-spacing="4">MERCHANT OPERATIONS VIEW</text>
  
  <text x="120" y="340" fill="#FFFFFF" font-family="'Avenir Next', 'Segoe UI', sans-serif" font-size="96" font-weight="700">Live Checkout</text>
  <text x="120" y="460" fill="#FFFFFF" font-family="'Avenir Next', 'Segoe UI', sans-serif" font-size="96" font-weight="700">Friction Monitor</text>
  
  <text x="120" y="560" fill="#A1A1A1" font-family="'Avenir Next', 'Segoe UI', sans-serif" font-size="34">A static Ecwid admin app for store owners who want</text>
  <text x="120" y="620" fill="#A1A1A1" font-family="'Avenir Next', 'Segoe UI', sans-serif" font-size="34">checkout-readiness insight without paying for</text>
  <text x="120" y="680" fill="#A1A1A1" font-family="'Avenir Next', 'Segoe UI', sans-serif" font-size="34">a custom backend or infrastructure.</text>
  
  <!-- Right Side Graphic Elements: Metric Panel -->
  <rect x="960" y="220" width="520" height="480" rx="32" fill="#2B2B2B" stroke="#4a4a4a" stroke-width="8"/>
  <rect x="1000" y="260" width="440" height="120" rx="24" fill="#3D3D3D"/>
  <text x="1040" y="300" fill="#FFFFFF" font-family="'Avenir Next', 'Segoe UI', sans-serif" font-size="22" font-weight="700" letter-spacing="4">CHECKOUT READINESS</text>
  <text x="1040" y="360" fill="#FFFFFF" font-family="'Avenir Next', 'Segoe UI', sans-serif" font-size="64" font-weight="700">98</text>
  <text x="1150" y="355" fill="#00D26A" font-family="'Avenir Next', 'Segoe UI', sans-serif" font-size="28">High Performing</text>
  
  <rect x="1000" y="420" width="120" height="220" rx="20" fill="#4B4B4B"/>
  <rect x="1160" y="460" width="120" height="180" rx="20" fill="#A1A1A1"/>
  <rect x="1320" y="520" width="120" height="120" rx="20" fill="#E52326"/>
  
</svg>
