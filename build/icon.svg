<svg width="1024" height="1024" viewBox="0 0 1024 1024" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Flat sophisticated charcoal background -->
  <rect width="1024" height="1024" rx="220" fill="#2B2B2B"/>
  
  <!-- Subtle inner border -->
  <rect x="64" y="64" width="896" height="896" rx="156" fill="transparent" stroke="#3D3D3D" stroke-width="24"/>
  
  <!-- Modern flat cart + search/monitor icon in white -->
  <!-- Cart body -->
  <path d="M280 320 L740 320 L700 620 L320 620 Z" fill="#FFFFFF" stroke="#FFFFFF" stroke-width="16" stroke-linejoin="round"/>
  
  <!-- Cart wheels -->
  <circle cx="380" cy="740" r="48" fill="#FFFFFF"/>
  <circle cx="640" cy="740" r="48" fill="#FFFFFF"/>
  
  <!-- Cart handle -->
  <path d="M200 220 L280 320" stroke="#FFFFFF" stroke-width="48" stroke-linecap="round"/>
  
  <!-- Monitor/Heartbeat inside cart (transparent cutout using a smaller dark path) -->
  <path d="M380 470 L460 470 L500 380 L560 560 L600 470 L660 470" stroke="#2B2B2B" stroke-width="32" stroke-linecap="round" stroke-linejoin="round"/>
</svg>
