name: CI

on:
  push:
    branches:
      - main
      - master
  pull_request:

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build static app
        run: npm run build

      - name: Lint sources
        run: npm run lint

      - name: Run tests
        run: npm test

      - name: Upload build artifact
        uses: actions/upload-artifact@v7
        with:
          name: static-build
          path: build
          if-no-files-found: error
